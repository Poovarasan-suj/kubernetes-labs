
### Create To ClusterIP Service

apiVersion: v1
kind: Service
metadata:
  name: my-cip-service
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 80


### Create To NodePort Service
Edit the service using below command

kubectl edit service my-cip-service ### COMMAND

it will open the service yaml in the editor, change the type to NodePort and add nodePort field as shown below
spec: 
type: NodePort
ports:
- protocol: TCP
  port: 9000
  targetPort: 80
  nodePort: 30007

  ###Create NodePort Service using yaml file
apiVersion: v1
kind: Service 
metadata:
  name: my-nodeport-service
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 80
      nodePort: 30007