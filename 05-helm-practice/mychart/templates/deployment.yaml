apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment 
spec:
  replicas: {{.Values.replicaCount}}
  selector:
    matchLabels:
      app: {{.Chart.Name}}
  template:
    metadata:
      labels:
        app: {{.Chart.Name}}
    spec:
      containers:
      - name: cont1
        image: {{.Values.image.repository}}:{{.Values.image.tag}}
        ports:
        - containerPort: {{.Values.containerPort}}
