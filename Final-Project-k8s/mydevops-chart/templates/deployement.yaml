apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydevops-deployment 
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.labels.app }}
  template:
    metadata:
      labels:
        app: {{ .Values.labels.app }}
    spec:
      containers:
      - name: {{ .Values.labels.app }}
        image: {{ .Values.container.image }}
        ports:
        - containerPort: {{ .Values.container.port }}
        envFrom:
        - configMapRef:
            name: mydevops-config
        - secretRef:
            name: mydevops-secret
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.container.port }}
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.container.port }}
          initialDelaySeconds: 5
          periodSeconds: 10 
          failureThreshold: 3
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"


